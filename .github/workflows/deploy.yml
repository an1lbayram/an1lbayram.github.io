name: Deploy to GitHub Pages

on:
  # Sadece main branch'e push yapıldığında çalışır
  push:
    branches: ["main"]
  # GitHub Actions sekmesinden manuel olarak tetiklemeye izin verir
  workflow_dispatch:

# GitHub Pages'e yazma izinleri tanımlıyoruz
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda birden fazla build çalışmasını engelliyoruz
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Aşama: Projeyi Derleme (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Build project
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # 2. Aşama: GitHub Pages'te Yayınlama (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
